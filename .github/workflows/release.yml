name: Release

# Builds Rainbow.pkg on tag push and publishes a GitHub Release with it.
# The .pkg name is normalized to `Rainbow.pkg` (no version suffix) so that
# https://github.com/<repo>/releases/latest/download/Rainbow.pkg always
# resolves — that's the URL the brand site's download CTA points at.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write   # creating releases + uploading assets
  packages: write   # pushing rainbow-web to ghcr.io

# Force checkout, setup-node, action-gh-release etc. onto the Node 24
# runtime ahead of GitHub's June 2026 deprecation of Node 20. Drop this
# env var once Node 24 is the runner default.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ─── Build + push the rainbow-web image to GHCR ──────────────
  # Runs on ubuntu-latest with docker/buildx so we can produce a
  # linux/arm64 image. Apple Container's buildkit on the user's Mac
  # used to build this in postinstall, but it hit a hard ~140 s
  # deadline at `npm ci` we couldn't work around. Pulling a prebuilt
  # image is faster and dodges that bug entirely.
  #
  # First push creates the package as private — flip it to public
  # once at github.com/users/<owner>/packages/container/rainbow-web/settings.
  build-image:
    # Native arm64 Linux runner — avoids QEMU emulation entirely.
    # When this was on `ubuntu-latest` (x86_64), `npm ci` for the
    # build stage crashed with `qemu: uncaught target signal 4
    # (Illegal instruction)` mid-install, and buildx silently looped
    # retrying it forever. Native runner = no QEMU = no crash.
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    outputs:
      version: ${{ steps.version.outputs.version }}
      image: ${{ steps.image.outputs.ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Compute image ref
        id: image
        run: |
          OWNER_LC="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          REF="ghcr.io/${OWNER_LC}/rainbow-web:${{ steps.version.outputs.version }}"
          REF_LATEST="ghcr.io/${OWNER_LC}/rainbow-web:latest"
          echo "ref=$REF"               >> "$GITHUB_OUTPUT"
          echo "ref_latest=$REF_LATEST" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push rainbow-web (linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: web
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.image.outputs.ref }}
            ${{ steps.image.outputs.ref_latest }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}

  release:
    needs: build-image
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Resolve version
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#v}"
          echo "TAG=$TAG"           >> "$GITHUB_ENV"
          echo "VERSION=$VERSION"   >> "$GITHUB_ENV"
          echo "Releasing $TAG (v$VERSION)"

      - name: Install build dependencies
        run: |
          brew update
          brew install yq

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Build dashboard bundle
        working-directory: dashboard
        run: |
          npm ci
          npm run build

      - name: Verify Swift toolchain
        run: |
          swift --version
          swiftc --version

      - name: Build .pkg (compiles Swift daemon + bundles dashboard)
        env:
          RAINBOW_VERSION: ${{ env.VERSION }}
          # Pin the rainbow-web image reference baked into the .pkg
          # to the one we just pushed in build-image. The .pkg's Phase
          # B `container image pull`s this exact tag at install time.
          RAINBOW_WEB_IMAGE: ${{ needs.build-image.outputs.image }}
          # Embedded into the payload at build time so postinstall has
          # the bearer token it needs to talk to rainbow.rocks's
          # subdomain-manager Worker. Same value the Worker has as its
          # API_SECRET. Acceptable risk for v1: anyone who downloads
          # the .pkg can extract it; rate-limit on the Worker bounds
          # abuse. Rotate when needed.
          RAINBOW_SUBDOMAIN_API_SECRET: ${{ secrets.RAINBOW_SUBDOMAIN_API_SECRET }}
        run: |
          bash installer/build-pkg.sh

      # ─── Optional: codesign + notarize ──────────────────────────
      # All of this is skipped if the secrets aren't configured. To
      # enable, set in the repo: APPLE_DEVELOPER_ID, APPLE_INSTALLER_CERT_P12,
      # APPLE_INSTALLER_CERT_PASSWORD, APPLE_NOTARY_API_KEY,
      # APPLE_NOTARY_API_KEY_ID, APPLE_NOTARY_API_ISSUER.

      - name: Sign embedded binaries, sign + notarize the .pkg
        if: ${{ env.APPLE_DEVELOPER_ID != '' }}
        env:
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
          APPLE_APPLICATION_ID: ${{ secrets.APPLE_APPLICATION_ID }}
          APPLE_INSTALLER_CERT_P12: ${{ secrets.APPLE_INSTALLER_CERT_P12 }}
          APPLE_APPLICATION_CERT_P12: ${{ secrets.APPLE_APPLICATION_CERT_P12 }}
          APPLE_INSTALLER_CERT_PASSWORD: ${{ secrets.APPLE_INSTALLER_CERT_PASSWORD }}
          APPLE_APPLICATION_CERT_PASSWORD: ${{ secrets.APPLE_APPLICATION_CERT_PASSWORD }}
          APPLE_NOTARY_API_KEY: ${{ secrets.APPLE_NOTARY_API_KEY }}
          APPLE_NOTARY_API_KEY_ID: ${{ secrets.APPLE_NOTARY_API_KEY_ID }}
          APPLE_NOTARY_API_ISSUER: ${{ secrets.APPLE_NOTARY_API_ISSUER }}
        run: |
          set -e
          # ─── Import both signing certs into a temp keychain ────
          KEYCHAIN="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -t 3600 -l "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

          # Installer cert — for productsign on the .pkg envelope
          echo "$APPLE_INSTALLER_CERT_P12" | base64 --decode > "$RUNNER_TEMP/installer.p12"
          security import "$RUNNER_TEMP/installer.p12" \
            -k "$KEYCHAIN" \
            -P "$APPLE_INSTALLER_CERT_PASSWORD" \
            -T /usr/bin/productsign

          # Application cert — for codesign on Mach-O binaries inside.
          # Falls back to APPLE_INSTALLER_CERT_PASSWORD if a separate
          # password isn't supplied (common case: same password).
          APP_CERT_PASS="${APPLE_APPLICATION_CERT_PASSWORD:-$APPLE_INSTALLER_CERT_PASSWORD}"
          echo "$APPLE_APPLICATION_CERT_P12" | base64 --decode > "$RUNNER_TEMP/app.p12"
          security import "$RUNNER_TEMP/app.p12" \
            -k "$KEYCHAIN" \
            -P "$APP_CERT_PASS" \
            -T /usr/bin/codesign

          security list-keychains -s "$KEYCHAIN" $(security list-keychains -d user | tr -d \"\")
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

          # ─── Codesign every Mach-O binary inside the payload ────
          # Notarization requires every executable + dylib to be signed
          # with a Developer ID Application cert + hardened runtime +
          # secure timestamp. We rebuild the .pkg AFTER signing inner
          # binaries, since pkgbuild bakes in the file contents.
          PAYLOAD="installer/build/payload"
          if [ -d "$PAYLOAD" ]; then
            find "$PAYLOAD" -type f \( -perm +111 -o -name "*.dylib" \) | \
              while read -r f; do
                if file "$f" | grep -q "Mach-O"; then
                  echo "Codesigning $f"
                  codesign --force --options runtime --timestamp \
                    --sign "$APPLE_APPLICATION_ID" "$f"
                fi
              done
          fi

          # Rebuild the inner pkg so it picks up the freshly-signed
          # binaries. (The product.pkg around it gets re-wrapped below.)
          rm -f installer/build/rainbow-component.pkg
          pkgbuild \
            --root "$PAYLOAD" \
            --scripts "installer/build/scripts" \
            --identifier "rocks.rainbow.installer" \
            --version "$VERSION" \
            --install-location "/" \
            "installer/build/rainbow-component.pkg"

          rm -f "installer/build/Rainbow-${VERSION}.pkg"
          productbuild \
            --distribution "installer/build/distribution.xml" \
            --resources "installer/resources" \
            --package-path "installer/build" \
            "installer/build/Rainbow-${VERSION}.pkg"

          # ─── Sign + notarize the .pkg envelope ────────────────
          PKG="installer/build/Rainbow-${VERSION}.pkg"
          SIGNED="installer/build/Rainbow-${VERSION}-signed.pkg"
          productsign --sign "$APPLE_DEVELOPER_ID" "$PKG" "$SIGNED"
          mv "$SIGNED" "$PKG"

          # Notarize. On Invalid, fetch the log so we can debug.
          echo "$APPLE_NOTARY_API_KEY" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"
          set +e
          xcrun notarytool submit "$PKG" \
            --key "$RUNNER_TEMP/AuthKey.p8" \
            --key-id "$APPLE_NOTARY_API_KEY_ID" \
            --issuer "$APPLE_NOTARY_API_ISSUER" \
            --wait | tee "$RUNNER_TEMP/notary-output.txt"
          NOTARY_EXIT=$?
          # Find the submission id even on failure so we can pull logs.
          SUB_ID=$(grep -E '^\s*id:' "$RUNNER_TEMP/notary-output.txt" | head -1 | awk '{print $2}')
          if [ "$NOTARY_EXIT" -ne 0 ] || grep -q "status: Invalid" "$RUNNER_TEMP/notary-output.txt"; then
            echo ""
            echo "::error::Notarization failed. Fetching log for submission $SUB_ID:"
            xcrun notarytool log "$SUB_ID" \
              --key "$RUNNER_TEMP/AuthKey.p8" \
              --key-id "$APPLE_NOTARY_API_KEY_ID" \
              --issuer "$APPLE_NOTARY_API_ISSUER" || true
            exit 1
          fi
          set -e
          xcrun stapler staple "$PKG"

          # ─── Cleanup ──────────────────────────────────────────
          security delete-keychain "$KEYCHAIN"
          rm -f "$RUNNER_TEMP/installer.p12" "$RUNNER_TEMP/app.p12" "$RUNNER_TEMP/AuthKey.p8"

      # ─── Normalize asset name + checksum ────────────────────────

      - name: Stage release assets
        run: |
          mkdir -p release-assets
          cp "installer/build/Rainbow-${VERSION}.pkg" release-assets/Rainbow.pkg
          cd release-assets
          shasum -a 256 Rainbow.pkg > Rainbow.pkg.sha256
          # Capture for the release body
          SHA=$(awk '{print $1}' Rainbow.pkg.sha256)
          SIZE=$(du -h Rainbow.pkg | awk '{print $1}')
          echo "SHA256=$SHA"  >> "$GITHUB_ENV"
          echo "SIZE=$SIZE"   >> "$GITHUB_ENV"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: Rainbow ${{ env.VERSION }}
          generate_release_notes: true
          files: |
            release-assets/Rainbow.pkg
            release-assets/Rainbow.pkg.sha256
          body: |
            ## Rainbow ${{ env.VERSION }} for macOS

            **Download:** [`Rainbow.pkg`](https://github.com/${{ github.repository }}/releases/download/${{ env.TAG }}/Rainbow.pkg) (${{ env.SIZE }})

            ### Verify the download

            ```bash
            shasum -a 256 -c Rainbow.pkg.sha256
            ```

            Expected SHA-256:

            ```
            ${{ env.SHA256 }}  Rainbow.pkg
            ```

            ### Install

            Double-click the `.pkg`. The installer:

            - Verifies your Mac (macOS 26+ on Apple Silicon, 8 GB RAM, 30 GB free)
            - Drops Rainbow at `/Applications/Rainbow/`
            - Installs Apple Container if missing
            - Pulls the Rainbow image from `ghcr.io/${{ github.repository_owner }}/rainbow-web` and opens the setup wizard in your browser

            See [docs/getting-started.md](https://github.com/${{ github.repository }}/blob/${{ env.TAG }}/docs/getting-started.md) for the post-install walkthrough.
