# Rainbow Default Values
# These are used when values are not specified in rainbow.yaml.
# Do not edit this file — override values in rainbow.yaml instead.

rainbow:
  version: "0.1.0"

domain:
  primary: "localhost"

cloudflare:
  zone_id: ""
  tunnel_id: ""

admin:
  name: "Admin"
  email: "admin@localhost"

services:
  postgres:
    version: "17"
    port: 5432
    user: "rainbow"
    databases:
      - "authentik"
      - "immich"
      - "seafile"

  valkey:
    version: "8"
    port: 6379

  caddy:
    http_port: 80
    https_port: 443

  cloudflared:
    metrics_port: 2000

  authentik:
    enabled: true
    http_port: 9000
    https_port: 9443

  immich:
    enabled: true
    upload_path: "./infrastructure/immich/upload"
    enable_ml: true
    server_port: 2283

  stalwart:
    enabled: true
    data_path: "/opt/rainbow/stalwart"
    smtp_port: 25
    submission_port: 587
    imaps_port: 993
    http_port: 8080
    domains: []

  cryptpad:
    enabled: true
    http_port: 3000
    sandbox_port: 3001

  seafile:
    enabled: true
    data_path: "./infrastructure/seafile/data"
    http_port: 8082

  jellyfin:
    enabled: true
    http_port: 8096
    media_paths: []

  minecraft:
    enabled: false
    memory: "4G"
    server_name: "Rainbow MC"
    max_players: 20
    port: 25565
    rcon_port: 25575

backups:
  enabled: true
  schedule: "0 3 * * *"
  repository: ""
  retention:
    keep_daily: 7
    keep_weekly: 4
    keep_monthly: 6

ai:
  enabled: true
  model: "claude-sonnet-4-20250514"

# Subdomain routing map (subdomain prefix -> service)
routing:
  photos: immich
  mail: stalwart
  files: seafile
  docs: cryptpad
  media: jellyfin
  auth: authentik
  app: dashboard
  api: mcp-gateway
  mc: minecraft
