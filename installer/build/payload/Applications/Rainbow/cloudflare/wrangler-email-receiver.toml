# Rainbow Email Receiver — separate Worker for inbound mail.
#
# Deploy with:
#   cd cloudflare
#   wrangler secret put INBOUND_MAIL_SECRET --config wrangler-email-receiver.toml
#     (paste the value of `security find-generic-password -s rainbow-inbound-mail-secret -w`)
#   wrangler deploy --config wrangler-email-receiver.toml
#
# Then in Cloudflare dashboard → Email → Email Routing → Email Workers,
# bind this worker to the destination address(es) you want it to handle
# (e.g. `aubrey@test.rainbow.rocks` → `rainbow-email-receiver`).

name = "rainbow-email-receiver"
main = "src/email-receiver/index.ts"
compatibility_date = "2024-12-01"

[vars]
# Override per environment if you have multiple deployments.
INBOUND_MAIL_URL = "https://test.rainbow.rocks/api/inbound-mail"

# INBOUND_MAIL_SECRET is set via `wrangler secret put` so it isn't checked in.
