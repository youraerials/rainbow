<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rainbow</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --bg: #0f1117;
        --surface: #1a1d27;
        --surface-hover: #232733;
        --border: #2a2e3a;
        --text: #e1e4eb;
        --text-dim: #8b8fa3;
        --accent: #6366f1;
        --accent-hover: #818cf8;
        --green: #22c55e;
        --red: #ef4444;
        --yellow: #eab308;
        --radius: 8px;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
