# Rainbow Docker Compose — Development Overrides
# Exposes service ports directly for local development.
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d

services:
  postgres:
    ports:
      - "127.0.0.1:5432:5432"

  redis:
    ports:
      - "127.0.0.1:6379:6379"

  authentik-server:
    ports:
      - "127.0.0.1:9000:9000"

  immich-server:
    ports:
      - "127.0.0.1:2283:2283"

  cryptpad:
    ports:
      - "127.0.0.1:3000:3000"
      - "127.0.0.1:3001:3001"

  seafile:
    ports:
      - "127.0.0.1:8082:80"
